name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: windows, os: windows-latest, platform: "windows/amd64" }
          - { name: linux,   os: ubuntu-latest,   platform: "linux/amd64" }
          - { name: macos,   os: macos-latest,    platform: "darwin/universal" }
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need the annotated tag object for its message

      - name: Extract tag message
        id: tagmsg
        shell: bash
        run: |
          # checkout plants a lightweight tag that shadows the annotated object;
          # force-refetch tags so %(contents) is the tag message, not the commit.
          git fetch --tags --force
          msg="$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}")"
          {
            echo 'body<<__PP_EOF__'
            echo "$msg"
            echo '__PP_EOF__'
          } >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v6
        with:
          go-version-file: desktop/go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Linux WebKit deps
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build (Linux, webkit 4.1)
        if: matrix.name == 'linux'
        working-directory: desktop
        run: wails build -platform ${{ matrix.platform }} -tags webkit2_41 -o plexprep-desktop

      - name: Build (Win/macOS)
        if: matrix.name != 'linux'
        working-directory: desktop
        run: wails build -platform ${{ matrix.platform }}

      - name: Package (Windows)
        if: matrix.name == 'windows'
        shell: bash
        working-directory: desktop/build/bin
        run: |
          name="plexprep-desktop_${GITHUB_REF_NAME}_windows_amd64"
          7z a "${name}.zip" plexprep-desktop.exe
          echo "ASSET=desktop/build/bin/${name}.zip" >> "$GITHUB_ENV"

      - name: Package (Linux)
        if: matrix.name == 'linux'
        shell: bash
        working-directory: desktop/build/bin
        run: |
          name="plexprep-desktop_${GITHUB_REF_NAME}_linux_amd64"
          tar czf "${name}.tar.gz" plexprep-desktop
          echo "ASSET=desktop/build/bin/${name}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (macOS)
        if: matrix.name == 'macos'
        shell: bash
        working-directory: desktop/build/bin
        run: |
          name="plexprep-desktop_${GITHUB_REF_NAME}_macos_universal"
          ditto -c -k --keepParent plexprep-desktop.app "${name}.zip"
          echo "ASSET=desktop/build/bin/${name}.zip" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.tagmsg.outputs.body }}
          files: ${{ env.ASSET }}
